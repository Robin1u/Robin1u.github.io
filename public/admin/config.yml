backend:
  name: github
  repo: robin1u/robin1u.github.io # Using your specific repository
  branch: main # Branch to update

media_folder: "public/images" # Where images are saved in the repo
public_folder: "/images" # The base path for images in the frontmatter

collections:
  - name: "home_settings"
    label: "首页设置 (Home)"
    files:
      - name: "home"
        label: "首页内容"
        file: "src/content/site/home.json"
        format: "json"
        fields:
          - {label: "姓名", name: "name", widget: "string"}
          - {label: "英文姓名", name: "nameEn", widget: "string", required: false}
          - {label: "首页标签（中文）", name: "heroTag", widget: "string", required: false}
          - {label: "首页标签（英文）", name: "heroTagEn", widget: "string", required: false}
          - {label: "状态文案（中文）", name: "status", widget: "string"}
          - {label: "状态文案（英文）", name: "statusEn", widget: "string", required: false}
          - {label: "地区（中文）", name: "location", widget: "string", required: false}
          - {label: "地区（英文）", name: "locationEn", widget: "string", required: false}
          - label: "身份 / 角色"
            name: "roles"
            widget: "list"
            summary: "{{fields.zh}}"
            fields:
              - {label: "中文", name: "zh", widget: "string"}
              - {label: "英文", name: "en", widget: "string", required: false}
          - {label: "关于我标题（中文）", name: "aboutTitle", widget: "string", required: false}
          - {label: "关于我标题（英文）", name: "aboutTitleEn", widget: "string", required: false}
          - {label: "联系邮箱", name: "contactEmail", widget: "string", required: false, hint: "用于侧栏“发送邮件” mailto 链接"}
          - label: "在这里找到我"
            name: "findMeLinks"
            widget: "list"
            summary: "{{fields.platform}}"
            fields:
              - label: "平台"
                name: "platform"
                widget: "select"
                options:
                  - {label: "GitHub", value: "github"}
                  - {label: "LinkedIn", value: "linkedin"}
                  - {label: "Hugging Face", value: "huggingface"}
                  - {label: "其他网站", value: "website"}
              - {label: "显示名称（可选）", name: "label", widget: "string", required: false}
              - {label: "链接 URL", name: "url", widget: "string", required: false}
          - label: "关于我段落"
            name: "aboutParagraphs"
            widget: "list"
            summary: "{{fields.zh}}"
            fields:
              - {label: "中文", name: "zh", widget: "text"}
              - {label: "英文", name: "en", widget: "text", required: false}
          - {label: "最近在做标题（中文）", name: "recentTitle", widget: "string", required: false}
          - {label: "最近在做标题（英文）", name: "recentTitleEn", widget: "string", required: false}
          - label: "最近在做"
            name: "recentItems"
            widget: "list"
            summary: "{{fields.category}} · {{fields.title}}"
            fields:
              - label: "分类"
                name: "category"
                widget: "select"
                options:
                  - {label: "学习新的技能", value: "learning"}
                  - {label: "考证", value: "certification"}
                  - {label: "阅读", value: "reading"}
                  - {label: "做项目", value: "project"}
              - {label: "标题（中文）", name: "title", widget: "string"}
              - {label: "标题（英文）", name: "titleEn", widget: "string", required: false}
              - {label: "想法 / 备注（中文）", name: "subtitle", widget: "string", required: false}
              - {label: "想法 / 备注（英文）", name: "subtitleEn", widget: "string", required: false}
              - label: "日期（页面会自动显示为 KW）"
                name: "date"
                widget: "datetime"
                date_format: "YYYY-MM-DD"
                time_format: false
              - {label: "已完成", name: "done", widget: "boolean", default: false, required: false}

  - name: "channel_settings"
    label: "频道设置 (Channel)"
    files:
      - name: "channel"
        label: "频道内容"
        file: "src/content/site/channel.json"
        format: "json"
        fields:
          - label: "频道链接"
            name: "channels"
            widget: "list"
            summary: "{{fields.platform}} - {{fields.title}}"
            fields:
              - label: "平台"
                name: "platform"
                widget: "select"
                options: ["bilibili", "xiaohongshu", "github"]
              - {label: "标题（中文）", name: "title", widget: "string", required: false}
              - {label: "标题（英文）", name: "titleEn", widget: "string", required: false}
              - {label: "账号 / Handle", name: "handle", widget: "string", required: false}
              - {label: "链接 URL", name: "url", widget: "string", required: false}
              - {label: "描述（中文）", name: "description", widget: "text", required: false}
              - {label: "描述（英文）", name: "descriptionEn", widget: "text", required: false}

  - name: "page_settings"
    label: "页面设置 (Pages)"
    files:
      - name: "pages"
        label: "页面标题与导航"
        file: "src/content/site/pages.json"
        format: "json"
        fields:
          - label: "首页"
            name: "home"
            widget: "object"
            fields:
              - {label: "导航名称（中文）", name: "navLabel", widget: "string"}
              - {label: "导航名称（英文）", name: "navLabelEn", widget: "string", required: false}
          - label: "作品集"
            name: "portfolio"
            widget: "object"
            fields:
              - {label: "编号", name: "sectionNumber", widget: "string"}
              - {label: "导航名称（中文）", name: "navLabel", widget: "string"}
              - {label: "导航名称（英文）", name: "navLabelEn", widget: "string", required: false}
              - {label: "页面说明（中文）", name: "intro", widget: "text", required: false}
              - {label: "页面说明（英文）", name: "introEn", widget: "text", required: false}
          - label: "想法"
            name: "thoughts"
            widget: "object"
            fields:
              - {label: "编号", name: "sectionNumber", widget: "string"}
              - {label: "导航名称（中文）", name: "navLabel", widget: "string"}
              - {label: "导航名称（英文）", name: "navLabelEn", widget: "string", required: false}
              - {label: "页面说明（中文）", name: "intro", widget: "text", required: false}
              - {label: "页面说明（英文）", name: "introEn", widget: "text", required: false}
          - label: "生活"
            name: "life"
            widget: "object"
            fields:
              - {label: "编号", name: "sectionNumber", widget: "string"}
              - {label: "导航名称（中文）", name: "navLabel", widget: "string"}
              - {label: "导航名称（英文）", name: "navLabelEn", widget: "string", required: false}
              - {label: "页面说明（中文）", name: "intro", widget: "text", required: false}
              - {label: "页面说明（英文）", name: "introEn", widget: "text", required: false}
          - label: "频道"
            name: "channel"
            widget: "object"
            fields:
              - {label: "编号", name: "sectionNumber", widget: "string"}
              - {label: "导航名称（中文）", name: "navLabel", widget: "string"}
              - {label: "导航名称（英文）", name: "navLabelEn", widget: "string", required: false}
              - {label: "页面说明（中文）", name: "intro", widget: "text", required: false}
              - {label: "页面说明（英文）", name: "introEn", widget: "text", required: false}

  - name: "projects"
    label: "作品集 (Projects)"
    folder: "src/content/projects"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "双语原稿自动拆分（可选）"
        name: "bilingualSource"
        widget: "text"
        required: false
        hint: "把双语原稿按标签贴在这里，保存时会自动拆到对应字段。必填标签：[ZH_TITLE] [EN_TITLE] [ZH_BODY] [EN_BODY]；可选标签：[ZH_DESC] [EN_DESC]。保存成功后此字段不会写入文件。"
      - {label: "标题 (Title)", name: "title", widget: "string"}
      - {label: "英文标题 (English Title)", name: "titleEn", widget: "string", required: false}
      - {label: "描述 (Description)", name: "description", widget: "text", required: false}
      - {label: "英文描述 (English Description)", name: "descriptionEn", widget: "text", required: false}
      - label: "主分类 (Primary Category)"
        name: "category"
        widget: "select"
        required: false
        options:
          - {label: "Web 应用", value: "web"}
          - {label: "设计系统", value: "design"}
          - {label: "工具", value: "tool"}
          - {label: "移动端", value: "mobile"}
      - label: "标签 (Tags)"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options:
          - "AI / LLM"
          - "Web"
          - "Design"
          - "Design System"
          - "Tooling"
          - "Productivity"
          - "Education"
          - "Research"
          - "Prototype"
          - "Accessibility"
          - "Open Source"
          - "Mobile"
      - {label: "发布日期 (Date)", name: "date", widget: "datetime"}
      - {label: "设为精选 (Featured)", name: "featured", widget: "boolean", default: false, required: false}
      - {label: "线上链接 (Live URL)", name: "liveUrl", widget: "string", required: false}
      - {label: "GitHub 链接", name: "githubUrl", widget: "string", required: false}
      - {label: "封面图 (Cover Image)", name: "image", widget: "image", required: false}
      - {label: "草稿 (Draft)", name: "draft", widget: "boolean", default: false, required: false}
      - {label: "中文正文 (Chinese Body)", name: "body", widget: "markdown"}
      - {label: "英文正文（支持 Markdown）", name: "bodyEn", widget: "text", required: false}

  - name: "thoughts"
    label: "观点 & 文章 (Thoughts)"
    folder: "src/content/thoughts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "双语原稿自动拆分（可选）"
        name: "bilingualSource"
        widget: "text"
        required: false
        hint: "把双语原稿按标签贴在这里，保存时会自动拆到对应字段。必填标签：[ZH_TITLE] [EN_TITLE] [ZH_BODY] [EN_BODY]；可选标签：[ZH_DESC] [EN_DESC]。保存成功后此字段不会写入文件。"
      - {label: "标题 (Title)", name: "title", widget: "string"}
      - {label: "英文标题 (English Title)", name: "titleEn", widget: "string", required: false}
      - {label: "摘要 (Description)", name: "description", widget: "text", required: false}
      - {label: "英文摘要 (English Description)", name: "descriptionEn", widget: "text", required: false}
      - label: "主分类 (Primary Category)"
        name: "category"
        widget: "select"
        required: false
        options:
          - "观点"
          - "设计"
          - "技术"
          - "学习"
          - "生活"
          - "ADHD"
          - "效率"
          - "创作"
      - label: "话题标签 (Topic Tags)"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options:
          - "ADHD"
          - "设计"
          - "技术"
          - "学习"
          - "效率"
          - "生活"
          - "创作"
          - "内容运营"
          - "方法论"
          - "工具"
          - "观察"
      - {label: "发布日期 (Date)", name: "date", widget: "datetime"}
      - {label: "阅读时间 (分钟)", name: "readTime", widget: "number", default: 5, required: false}
      - {label: "设为精选 (Featured)", name: "featured", widget: "boolean", default: false, required: false}
      - {label: "草稿 (Draft)", name: "draft", widget: "boolean", default: false, required: false}
      - {label: "中文正文 (Chinese Body)", name: "body", widget: "markdown"}
      - {label: "英文正文（支持 Markdown）", name: "bodyEn", widget: "text", required: false}

  - name: "life"
    label: "生活 & 照片 (Life)"
    folder: "src/content/life"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "ID", name: "id", widget: "string", required: false}
      - {label: "标题 (Title)", name: "title", widget: "string"}
      - {label: "英文标题 (English Title)", name: "titleEn", widget: "string", required: false}
      - {label: "日期 (Date)", name: "date", widget: "datetime"}
      - {label: "地点 (Location)", name: "location", widget: "string", required: false}
      - {label: "英文地点 (English Location)", name: "locationEn", widget: "string", required: false}
      - {label: "图片 (Image)", name: "image", widget: "image"}
      - {label: "说明文字 (Caption)", name: "caption", widget: "string", required: false}
      - {label: "英文说明 (English Caption)", name: "captionEn", widget: "string", required: false}
      - {label: "宽版显示 (Wide)", name: "wide", widget: "boolean", default: false, required: false}
      - {label: "高版显示 (Tall)", name: "tall", widget: "boolean", default: false, required: false}
